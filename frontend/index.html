<!DOCTYPE html>
<html lang="es">
<head>

    <title>Peña Zaragocista - Portal Oficial</title>

<body>

    <div id="header-placeholder"></div>

    <main>

                <h2 class="mb-4">Próximo Partido</h2>
                <div class="card my-3 shadow-sm mx-auto" style="max-width: 500px;">

                        <h3>Real Zaragoza vs Rival</h3>

                        <button class="btn btn-primary">Ver detalle</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="container mt-5">
            <h2 class="mb-4">Cartelera de Viajes</h2>
            <div id="lista-viajes" class="row"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
