<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Completa - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="py-5">
        <div class="container">
            
            <div class="mb-5">
                <h1 class="fw-bold text-uppercase m-0">📸 Galería de Recuerdos</h1>
                <p class="text-muted m-0">El histórico de fotos de la Peña Zaragocista "Presentes por el Escudo"</p>
            </div>

            <div class="row g-4">
                
                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/viaje_andorra.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/carnaval_presentes.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Siempre_presentes.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Andorra-Real_Zaragoza_previa.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Castellon-Real Zaragoza.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Museo_Zaragocista.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/presentes_fiesta_navidad.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Previa_Racing_Santander-Real_Zaragoza.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/Presentes_Romareda.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                        <img src="assets/presentes_londres.webp" class="card-img-top img-fluid" alt="Foto Peña" style="object-fit: cover; height: 220px;" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="enmascararImagen(this)">
                    </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/app.js"></script>

    <script>
        function enmascararImagen(elemento) {
            const rutaImagen = elemento.getAttribute('src');
            const imagenModal = document.getElementById('modalImage');
            if (imagenModal) {
                imagenModal.setAttribute('src', rutaImagen);
            }
        }
    </script>

    <div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 position-relative text-center">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" id="modalImage" class="img-fluid rounded shadow-lg" alt="Imagen ampliada" style="max-height: 85vh; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
