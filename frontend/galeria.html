<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Completa - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="py-5">
        <div class="container">
            
            <div class="mb-5">
                <h1 class="fw-bold text-uppercase m-0">📸 Galería de Recuerdos</h1>
                <p class="text-muted m-0">El histórico de fotos de la Peña Zaragocista "Presentes por el Escudo"</p>
            </div>

            <div class="row g-4" id="contenedor-galeria">
                <div class="col-12 text-center py-5">
                    <p class="text-muted">Cargando los recuerdos de la peña...</p>
                </div>
            </div>
            
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Función para abrir la imagen en grande dentro del modal
        function enmascararImagen(elemento) {
            const rutaImagen = elemento.getAttribute('src');
            const imagenModal = document.getElementById('modalImage');
            if (imagenModal) {
                imagenModal.setAttribute('src', rutaImagen);
            }
        }

        // 🔴 SCRIPT DE UNIFICACIÓN DINÁMICA
        // Se ejecuta automáticamente al cargar la página para pedir las fotos a FastAPI
        document.addEventListener("DOMContentLoaded", async () => {
            const contenedor = document.getElementById("contenedor-galeria");
            
            try {
                const respuesta = await fetch("http://127.0.0.1:8000/galeria");
                if (!respuesta.ok) throw new Error("Error al conectar con la API");
                
                const imagenes = await respuesta.json();
                
                // Si la base de datos de FastAPI está vacía
                if (imagenes.length === 0) {
                    contenedor.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <p class="text-muted">No hay fotos publicadas en la galería todavía.</p>
                        </div>`;
                    return;
                }
                
                // Limpiamos el mensaje de "Cargando..."
                contenedor.innerHTML = "";
                
                // Recorremos la lista que nos manda el backend y creamos las tarjetas al vuelo
                imagenes.forEach(foto => {
                    const columna = document.createElement("div");
                    columna.className = "col-12 col-sm-6 col-md-4 col-lg-3";
                    
                    columna.innerHTML = `
                        <div class="card border-0 shadow-sm overflow-hidden gallery-card h-100">
                            <img src="${foto.url}" 
                                 class="card-img-top img-fluid" 
                                 alt="${foto.titulo}" 
                                 title="${foto.pie_foto}"
                                 style="object-fit: cover; height: 220px; cursor: pointer;" 
                                 data-bs-toggle="modal" 
                                 data-bs-target="#galleryModal" 
                                 onclick="enmascararImagen(this)">
                        </div>
                    `;
                    contenedor.appendChild(columna);
                });

            } catch (error) {
                console.error("Fallo al cargar la galería:", error);
                contenedor.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <p class="text-danger">❌ No se pudieron cargar las fotos. Asegúrate de que el Backend esté corriendo.</p>
                    </div>`;
            }
        });
    </script>

    <div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 position-relative text-center">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" id="modalImage" class="img-fluid rounded shadow-lg" alt="Imagen ampliada" style="max-height: 85vh; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
