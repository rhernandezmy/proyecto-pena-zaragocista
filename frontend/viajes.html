<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row mb-5">
            <div class="col text-center">
                <h1 class="fw-bold text-dark mb-2">✈️ Próximos Viajes</h1>
                <p class="text-muted col-lg-6 mx-auto">Acompaña al Real Zaragoza en sus partidos fuera de casa. ¡Organiza tu desplazamiento y no te quedes sin tu plaza!</p>
                <hr class="mx-auto border-primary opacity-75" style="width: 60px; height: 3px;">
            </div>
        </div>

        <div id="contenedor-viajes" class="row justify-content-center g-4">
            
            <div class="text-center my-5 py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Cargando viajes...</span>
                </div>
                <p class="text-muted mt-3 fw-medium">Buscando viajes disponibles desde el servidor...</p>
            </div>
            
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    
    <script src="js/viajes.js"></script> 
</body>
</html>
