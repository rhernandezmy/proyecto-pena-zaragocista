<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm p-4">
                    <h2 class="fw-bold text-center mb-4" style="color: #0033A0;">📩 Contacta con la Peña</h2>
                    <p class="text-muted text-center small mb-4">¿Quieres darte de alta, proponernos una actividad o reservar un viaje? Déjanos tu mensaje.</p>
                    
                    <form id="form-contacto" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold small">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" required placeholder="Ej. Javier Martínez">
                            <div class="invalid-feedback">Por favor, introduce tu nombre.</div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold small">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" required placeholder="nombre@correo.com">
                            <div class="invalid-feedback">Introduce un correo electrónico válido.</div>
                        </div>

                        <div class="mb-3">
                            <label for="asunto" class="form-label fw-bold small">Asunto</label>
                            <input type="text" class="form-control" id="asunto" required placeholder="Ej. Duda sobre cuota de socio">
                            <div class="invalid-feedback">El asunto es obligatorio.</div>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label fw-bold small">Mensaje</label>
                            <textarea class="form-control" id="mensaje" rows="4" required placeholder="Escribe aquí tu consulta detallada..."></textarea>
                            <div class="invalid-feedback">El cuerpo del mensaje no puede estar vacío.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">🚀 Enviar Mensaje</button>
                    </form>

                    <div id="alerta-contacto" class="alert d-none mt-3 text-center" role="alert"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <script>
        document.getElementById('form-contacto').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = this;
            const alerta = document.getElementById('alerta-contacto');
            
            // Activar validación visual de Bootstrap
            form.classList.add('was-validated');
            
            if (!form.checkValidity()) {
                return; // Si falta algún campo obligatorio, frena aquí.
            }

            // Recoger datos
            const datos = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                asunto: document.getElementById('asunto').value,
                mensaje: document.getElementById('mensaje').value
            };

            try {
                const response = await fetch('http://localhost:8000/api/contacto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    alerta.className = "alert alert-success mt-3 text-center";
                    alerta.textContent = "¡Mensaje enviado con éxito! El administrador lo revisará pronto.";
                    alerta.classList.remove('d-none');
                    form.reset();
                    form.classList.remove('was-validated');
                } else {
                    throw new Error();
                }
            } catch (error) {
                alerta.className = "alert alert-danger mt-3 text-center";
                alerta.textContent = "❌ Error al conectar con el servidor. Inténtalo de nuevo.";
                alerta.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
