<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Socios - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm p-4">
                    <h3 class="text-center mb-4">Acceso de Socio</h3>
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control" required placeholder="nombre@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none text-muted small">Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("login-form");

            loginForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                try {
                    // URL ajustada a /auth/login porque en main.py usas prefix="/auth"
                    const response = await fetch("http://localhost:8000/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        
                        localStorage.setItem("socio_nombre", data.nombre);
                        localStorage.setItem("socio_email", email);
                        localStorage.setItem("socio_id", data.id);
                        
                        alert("¡Bienvenido, " + data.nombre + "!");
                        window.location.href = "index.html"; 
                    } else {
                        alert("Error: Correo o contraseña incorrectos.");
                    }
                } catch (error) {
                    console.error("Error completo:", error);
                    alert("No se pudo conectar con el servidor. Asegúrate de que FastAPI esté corriendo.");
                }
            });
        });
    </script>
</body>
</html>
