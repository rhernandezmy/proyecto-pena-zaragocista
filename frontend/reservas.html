<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Local - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Rejilla real y forzada de 7 columnas para los días de la semana */
        .semana-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            height: 90px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .calendar-day:hover:not(.empty-day) {
            background-color: #e9ecef !important;
        }
        .day-number {
            font-weight: bold;
        }
        .status-badge {
            font-size: 0.7rem;
            display: block;
            margin-top: 5px;
        }
        .bg-ocupado {
            background-color: #f8d7da !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row mb-4">
            <div class="col text-center">
                <h1 class="fw-bold text-dark">🏠 Reserva de nuestro Local Social</h1>
                <p class="text-muted">Consulta los días disponibles en el calendario. Haz clic en un día libre para tramitar tu solicitud.</p>
                <div class="d-flex justify-content-center gap-3 mt-2">
                    <span><i class="fas fa-square text-white border text-muted me-1"></i> Disponible</span>
                    <span><i class="fas fa-square text-danger me-1"></i> Ocupado / Reservado</span>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm p-4 bg-white mx-auto" style="max-width: 900px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button id="btn-prev-month" class="btn btn-outline-primary btn-sm"><i class="fas fa-chevron-left"></i> Anterior</button>
                <h3 id="calendar-month-year" class="fw-bold text-uppercase m-0 style-color" style="color: #0033A0;">Junio 2026</h3>
                <button id="btn-next-month" class="btn btn-outline-primary btn-sm">Siguiente <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="semana-grid text-center fw-bold border-bottom pb-2 mb-2 text-secondary">
                <div>Lun</div>
                <div>Mar</div>
                <div>Mié</div>
                <div>Jue</div>
                <div>Vie</div>
                <div>Sáb</div>
                <div>Dom</div>
            </div>

            <div id="calendar-grid" class="semana-grid"></div>
        </div>
    </main>

    <div class="modal fade" id="modalReserva" tabindex="-1" aria-labelledby="modalReservaLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalReservaLabel"><i class="fas fa-paper-plane me-2"></i>Solicitar Uso del Local</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="form-solicitar-local">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Fecha Seleccionada</label>
                            <input type="text" id="modal-fecha-display" class="form-control bg-light" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Motivo de la Reserva / Evento</label>
                            <select id="modal-motivo" class="form-select" required>
                                <option value="Ver partido fuera de casa">Ver partido fuera de casa</option>
                                <option value="Reunión familiar / Amigos">Reunión de Peñistas / Celebración</option>
                                <option value="Evento Cultural / Asamblea">Evento Cultural / Asamblea</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Detalles adicionales</label>
                            <textarea id="modal-detalles" class="form-control" rows="3" placeholder="Ej: Seremos unos 15 peñistas para cenar..." required></textarea>
                        </div>
                        <div id="alerta-sesion" class="alert alert-warning p-2 small d-none">
                            ⚠️ Debes iniciar sesión para poder tramitar una solicitud.
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" id="btn-enviar-reserva" class="btn btn-warning text-dark fw-bold">Enviar Solicitud</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <script>
        let fechaActual = new Date(2026, 5, 1); // Junio de 2026
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const grid = document.getElementById("calendar-grid");
        const monthYearLabel = document.getElementById("calendar-month-year");
        const modalElement = new bootstrap.Modal(document.getElementById('modalReserva'));
        
        let fechaSeleccionadaGlobal = "";

        function obtenerFechasOcupadasReales() {
            let ocupadas = [];
            for (let i = 0; i < localStorage.length; i++) {
                let clave = localStorage.key(i);
                if (clave.startsWith("reservas_socio_")) {
                    let reservas = JSON.parse(localStorage.getItem(clave)) || [];
                    reservas.forEach(res => {
                        if (res.fecha) ocupadas.push(res.fecha);
                    });
                }
            }
            return ocupadas;
        }

        function renderCalendar() {
            grid.innerHTML = "";
            const año = fechaActual.getFullYear();
            const mes = fechaActual.getMonth();

            monthYearLabel.textContent = `${meses[mes]} ${año}`;

            const primerDiaIndex = new Date(año, mes, 1).getDay();
            const diasFaltantes = primerDiaIndex === 0 ? 6 : primerDiaIndex - 1;

            // Huecos del mes anterior
            for (let i = 0; i < diasFaltantes; i++) {
                const emptyDiv = document.createElement("div");
                emptyDiv.className = "calendar-day empty-day bg-white border border-light opacity-25";
                grid.appendChild(emptyDiv);
            }

            // Días del mes actual
            const totalDias = new Date(año, mes + 1, 0).getDate();
            const fechasOcupadas = obtenerFechasOcupadasReales();

            for (let dia = 1; dia <= totalDias; dia++) {
                const col = document.createElement("div");
                const mesFormateado = String(mes + 1).padStart(2, '0');
                const diaFormateado = String(dia).padStart(2, '0');
                const fechaString = `${año}-${mesFormateado}-${diaFormateado}`;

                col.className = "calendar-day bg-white border d-flex flex-column justify-content-between p-2";
                col.innerHTML = `<span class="day-number">${dia}</span>`;

                if (fechasOcupadas.includes(fechaString)) {
                    col.classList.add("bg-ocupado");
                    col.innerHTML += `<span class="badge bg-danger status-badge">🔴 Ocupado</span>`;
                } else {
                    col.innerHTML += `<span class="badge bg-success status-badge">🟢 Libre</span>`;
                    col.addEventListener("click", () => abrirFormulario(fechaString));
                }

                grid.appendChild(col);
            }
        }

        function abrirFormulario(fecha) {
            fechaSeleccionadaGlobal = fecha;
            document.getElementById("modal-fecha-display").value = fecha;
            
            const socioId = localStorage.getItem("socio_id");
            if (!socioId) {
                document.getElementById("alerta-sesion").classList.remove("d-none");
                document.getElementById("btn-enviar-reserva").disabled = true;
            } else {
                document.getElementById("alerta-sesion").classList.add("d-none");
                document.getElementById("btn-enviar-reserva").disabled = false;
            }
            modalElement.show();
        }

        document.getElementById("form-solicitar-local").addEventListener("submit", (e) => {
            e.preventDefault();
            const socioId = localStorage.getItem("socio_id");
            const motivo = document.getElementById("modal-motivo").value;
            const detalles = document.getElementById("modal-detalles").value;

            const nuevaReserva = {
                tipo: "Local",
                detalle: `Reserva Local: ${motivo} (${detalles})`,
                fecha: fechaSeleccionadaGlobal,
                estado: "Pendiente"
            };

            let misReservas = JSON.parse(localStorage.getItem(`reservas_socio_${socioId}`)) || [];
            misReservas.push(nuevaReserva);
            localStorage.setItem(`reservas_socio_${socioId}`, JSON.stringify(misReservas));

            alert("¡Solicitud enviada con éxito! Redirigiendo a tu Área Privada...");
            modalElement.hide();
            window.location.href = "socio.html"; 
        });

        document.getElementById("btn-prev-month").addEventListener("click", () => {
            fechaActual.setMonth(fechaActual.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById("btn-next-month").addEventListener("click", () => {
            fechaActual.setMonth(fechaActual.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>
