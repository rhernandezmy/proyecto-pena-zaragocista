<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificación - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="header-placeholder"></div>

    <main class="container py-5">
        <h2 class="fw-bold mb-4">🛡️ Clasificación Real Zaragoza pendiente de confirmar grupos</h2>

        <div class="card border-0 shadow-sm p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="tabla-clasificacion">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Selección</th>
                            <th>PJ</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="body-clasificacion">
                        <tr><td colspan="4" class="text-center">Cargando datos del Mundial...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/clasificacion.js"></script>
</body>
</html>
