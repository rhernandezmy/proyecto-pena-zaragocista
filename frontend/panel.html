<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container mt-5">
        <h2 class="mb-4">Bienvenido, <span id="nombre-socio"></span></h2>
        
        <div class="row mt-4 g-4">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="text-primary mb-3"><i class="fas fa-bus"></i> Mis Viajes Reservados</h5>
                    <ul id="lista-viajes" class="list-group list-group-flush">
                        <li class="list-group-item">Cargando viajes...</li>
                    </ul>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="text-primary mb-3"><i class="fas fa-euro-sign"></i> Estado de Cuotas</h5>
                    <ul id="lista-cuotas" class="list-group list-group-flush">
                        <li class="list-group-item">Cargando cuotas...</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

    <script>
        // 1. Verificación de seguridad flexible
        const socioNombre = localStorage.getItem("socio_nombre");
        const socioEmail = localStorage.getItem("socio_email");
        const socioRol = localStorage.getItem("socio_rol");

        if (!socioNombre || !socioEmail) {
            window.location.href = "login.html";
        } else {
            // Si eres el administrador general sin vincular, te ponemos un nombre amigable
            document.getElementById("nombre-socio").innerText = socioNombre || "Administrador";
            cargarDatosPanel();
        }

        // 2. Carga dinámica de datos controlando excepciones de cuentas vacías/admin
        async function cargarDatosPanel() {
            try {
                // Buscamos la ruta correcta (ajusta el prefijo /panel si tu router lo exige)
                const response = await fetch(`http://localhost:8000/panel/panel-data/${socioEmail}`);
                
                // Si el servidor da error (por ejemplo, un 500 por el fallo de panel.py con el Admin)
                if (!response.ok) {
                    throw new Error("Respuesta no válida del servidor");
                }

                const data = await response.json();

                // Rellenar Viajes de forma segura
                const containerViajes = document.getElementById("lista-viajes");
                containerViajes.innerHTML = data.reservas && data.reservas.length > 0 
                    ? data.reservas.map(r => `<li class="list-group-item">Destino: <strong>${r.destino}</strong> - ${r.asientos} asiento(s)</li>`).join("")
                    : '<li class="list-group-item text-muted"><i class="fas fa-info-circle"></i> No tienes viajes reservados actualmente.</li>';

                // Rellenar Cuotas de forma segura
                const containerCuotas = document.getElementById("lista-cuotas");
                containerCuotas.innerHTML = data.cuotas && data.cuotas.length > 0
                    ? data.cuotas.map(c => `<li class="list-group-item">Año ${c.ano}: <span class="badge bg-${c.estado === 'Pagada' ? 'success' : 'warning'}">${c.estado}</span></li>`).join("")
                    : '<li class="list-group-item text-muted"><i class="fas fa-info-circle"></i> No hay registros de cuotas para esta cuenta.</li>';

            } catch (error) {
                console.warn("Aviso al cargar datos del panel (Cuenta Admin o desvinculada):", error);
                
                // Si eres Admin, es normal no tener viajes ni cuotas asignadas en la base de datos limpia
                if (socioRol === "Admin" || socioRol === "admin") {
                    document.getElementById("lista-viajes").innerHTML = '<li class="list-group-item text-muted"><i class="fas fa-shield-alt"></i> Panel de control limpio (Perfil Administrador).</li>';
                    document.getElementById("lista-cuotas").innerHTML = '<li class="list-group-item text-muted"><i class="fas fa-shield-alt"></i> Las cuotas se gestionan desde el panel global.</li>';
                } else {
                    document.getElementById("lista-viajes").innerHTML = '<li class="list-group-item text-danger">Error al conectar con tus reservas.</li>';
                    document.getElementById("lista-cuotas").innerHTML = '<li class="list-group-item text-danger">Error al recuperar tus cuotas.</li>';
                }
            }
        }
    </script>
</body>
</html>
