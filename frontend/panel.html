<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container mt-5">
        <h2 class="mb-4">Bienvenido, <span id="nombre-socio"></span></h2>
        
        <div class="row mt-4 g-4">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="text-primary mb-3"><i class="fas fa-bus"></i> Mis Viajes Reservados</h5>
                    <ul id="lista-viajes" class="list-group list-group-flush">
                        <li class="list-group-item">Cargando viajes...</li>
                    </ul>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="text-primary mb-3"><i class="fas fa-euro-sign"></i> Estado de Cuotas</h5>
                    <ul id="lista-cuotas" class="list-group list-group-flush">
                        <li class="list-group-item">Cargando cuotas...</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

    <script>
        // 1. Verificación de seguridad flexible (Permite la entrada tanto a Socios como a Admins)
        const socioNombre = localStorage.getItem("socio_nombre");
        const socioEmail = localStorage.getItem("socio_email");

        // Solo echamos al usuario si no hay datos de sesión en absoluto
        if (!socioNombre || !socioEmail) {
            window.location.href = "login.html";
        } else {
            // Si tiene datos válidos (sea Admin o Socio), le damos la bienvenida y cargamos el panel
            document.getElementById("nombre-socio").innerText = socioNombre;
            cargarDatosPanel();
        }

        // 2. Carga dinámica de datos desde el backend
        async function cargarDatosPanel() {
            try {
                const response = await fetch(`http://localhost:8000/panel-data/${socioEmail}`);
                const data = await response.json();

                // Rellenar Viajes
                const containerViajes = document.getElementById("lista-viajes");
                containerViajes.innerHTML = data.reservas && data.reservas.length > 0 
                    ? data.reservas.map(r => `<li class="list-group-item">Destino: <strong>${r.destino}</strong> - ${r.asientos} asiento(s)</li>`).join("")
                    : '<li class="list-group-item text-muted">No tienes viajes reservados actualmente.</li>';

                // Rellenar Cuotas
                const containerCuotas = document.getElementById("lista-cuotas");
                containerCuotas.innerHTML = data.cuotas && data.cuotas.length > 0
                    ? data.cuotas.map(c => `<li class="list-group-item">Año ${c.ano}: <span class="badge bg-${c.estado === 'Pagada' ? 'success' : 'warning'}">${c.estado}</span></li>`).join("")
                    : '<li class="list-group-item text-muted">No hay registros de cuotas.</li>';

            } catch (error) {
                console.error("Error al cargar datos:", error);
                document.getElementById("lista-viajes").innerHTML = '<li class="list-group-item text-danger">Error al conectar con el servidor.</li>';
                document.getElementById("lista-cuotas").innerHTML = '<li class="list-group-item text-danger">Error al conectar con el servidor.</li>';
            }
        }
    </script>
</body>
</html>
