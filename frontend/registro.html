<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Socio - Peña Zaragocista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .register-card { max-width: 450px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #003da5; }
        .logo-img { height: 80px; display: block; margin: 0 auto 20px; }
        .btn-zaragoza { background-color: #003da5; color: white; border: none; font-weight: bold; padding: 12px; }
        .btn-zaragoza:hover { background-color: #002b75; color: white; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #6c757d; }
        .footer-link a { color: #da2a1d; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card">
        <a href="index.html"><img src="assets/logo.png" alt="Logo" class="logo-img"></a>
        <h3 class="text-center mb-4" style="color: #003da5; font-weight: 700;">ACTIVAR CUENTA</h3>
        
        <form id="form-registro">
            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="mb-4">
                <label for="password_confirm" class="form-label fw-bold">Repetir Contraseña</label>
                <input type="password" id="password_confirm" class="form-control" placeholder="Confirma tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-zaragoza w-100">ACTIVAR MI ACCESO</button>
        </form>

        <div id="mensaje" class="mt-3 text-center d-none"></div>

        <div class="footer-link">
            ¿Ya tienes tu cuenta activada? <br>
            <a href="index.html">Inicia sesión en el Área Privada</a>
        </div>
    </div>
</div>

<script>
    document.getElementById("form-registro").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;
        const passwordConfirm = document.getElementById("password_confirm").value;
        const divMensaje = document.getElementById("mensaje");

        if (password !== passwordConfirm) {
            divMensaje.innerHTML = "❌ Las contraseñas no coinciden.";
            divMensaje.className = "mt-3 alert alert-danger";
            divMensaje.classList.remove("d-none");
            return;
        }

        divMensaje.classList.remove("d-none", "alert-danger", "alert-success", "alert-warning");
        divMensaje.innerHTML = "Enviando correo de verificación...";
        divMensaje.className = "mt-3 alert alert-info";

        try {
            const response = await fetch("http://localhost:8000/auth/registro", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                divMensaje.innerHTML = "✅ ¡Cuenta creada! Revisa tu email para activar el acceso.";
                divMensaje.className = "mt-3 alert alert-success";
                // Dejamos que el usuario lea el mensaje antes de enviarlo al login
                setTimeout(() => window.location.href = "index.html", 5000);
            } else {
                divMensaje.innerHTML = "❌ " + (data.detail || "Error en el registro");
                divMensaje.className = "mt-3 alert alert-danger";
            }
        } catch (error) {
            divMensaje.innerHTML = "⚠️ No se pudo conectar con el servidor.";
            divMensaje.className = "mt-3 alert alert-danger";
        }
    });
</script>

</body>
</html>
