<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Partidos - Peña Zaragocista</title>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container py-5">
        <h1 class="mb-4">Agenda Deportiva</h1>
        
        <div class="alert alert-warning">
            <strong>Real Zaragoza:</strong> Actualmente no hay partidos programados.
        </div>

        <h2 class="mt-5 mb-4 text-primary">Partidos de España (Mundial 2026)</h2>
        <div id="lista-partidos-espana" class="row g-4">
            </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script>
        const partidosEspaña = [
            { rival: "Alemania", fecha: "12 Junio", hora: "20:00" },
            { rival: "Japón", fecha: "16 Junio", hora: "17:00" },
            { rival: "Costa Rica", fecha: "20 Junio", hora: "21:00" }
        ];

        const contenedor = document.getElementById('lista-partidos-espana');
        partidosEspaña.forEach(p => {
            contenedor.innerHTML += `
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">España vs ${p.rival}</h5>
                            <p class="card-text">Fecha: ${p.fecha} <br> Hora: ${p.hora}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
