<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Partidos - Peña Zaragocista</title>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container py-5">
        <h1 class="mb-4">Agenda Deportiva</h1>
        
        <div class="alert alert-warning">
            <strong>Real Zaragoza:</strong> Actualmente no hay partidos programados.
        </div>

        <h2 class="mt-5 mb-4 text-primary">Partidos de España (Mundial 2026)</h2>
        <div id="lista-partidos-espana" class="row g-4">
            <p>Cargando partidos...</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const contenedor = document.getElementById('lista-partidos-espana');
            
            try {
                // Llamada a nuestro backend (FastAPI)
                const response = await fetch("http://localhost:8000/mundial/partidos-espana");
                
                if (!response.ok) throw new Error("Error al obtener los datos");
                
                const data = await response.json();
                const partidos = data.partidos;

                contenedor.innerHTML = ""; // Limpiamos el mensaje de "Cargando..."

                if (partidos.length === 0) {
                    contenedor.innerHTML = "<p>No hay partidos programados actualmente.</p>";
                    return;
                }

                partidos.forEach(p => {
                    // Formatear la fecha que viene de la API
                    const fecha = new Date(p.utcDate).toLocaleDateString();
                    const hora = new Date(p.utcDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const rival = p.homeTeam.name === "Spain" ? p.awayTeam.name : p.homeTeam.name;

                    contenedor.innerHTML += `
                        <div class="col-md-4">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title">España vs ${rival}</h5>
                                    <p class="card-text">
                                        <strong>Fecha:</strong> ${fecha} <br> 
                                        <strong>Hora:</strong> ${hora}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = `<div class="alert alert-danger">Error al cargar los partidos del Mundial.</div>`;
            }
        });
    </script>
</body>
</html>
